# Report results pipeline configuration.
# Drives the orchestrator at src/data_science/tasks/report.py to produce all
# Section 4 Results tables and confusion-matrix figures for the data science report.

random_seed: 42

datasets:

  parkinsons:
    target: class
    groups: id
    subsample:
      enabled: false

    preprocessing_configurations:
      - name: raw
        steps:
      - name: scaled
        steps:
          - type: scaling
            method: standard
      - name: scaled_feature_selection
        steps:
          - type: scaling
            method: standard
          - type: feature_selection
            method: select_k_best
            k: 100
      - name: scaled_pca
        steps:
          - type: scaling
            method: standard
          - type: dimensionality_reduction
            method: pca
            n_components: 100
      - name: scaled_class_weighting
        steps:
          - type: scaling
            method: standard
          - type: class_balancing
            method: class_weighting
      - name: scaled_feature_selection_class_weighting
        steps:
          - type: scaling
            method: standard
          - type: feature_selection
            method: select_k_best
            k: 100
          - type: class_balancing
            method: class_weighting
      - name: scaled_pca_class_weighting
        steps:
          - type: scaling
            method: standard
          - type: dimensionality_reduction
            method: pca
            n_components: 100
          - type: class_balancing
            method: class_weighting

    training:
      cross_validation:
        method: stratified_group_kfold
        n_splits: 10
      test_split:
        method: group_shuffle
        test_size: 0.2

    evaluation:
      primary_metric: f1
      report_metrics:
        - accuracy
        - precision
        - recall
        - f1
        - roc_auc

  covertype:
    target: Cover_Type
    groups:
    subsample:
      enabled: true
      method: stratified
      per_class: 1000

    preprocessing_configurations:
      - name: raw
        steps:
      - name: scaled
        steps:
          - type: scaling
            method: standard
      - name: scaled_feature_selection
        steps:
          - type: scaling
            method: standard
          - type: feature_selection
            method: select_k_best
            k: 20

    training:
      cross_validation:
        method: stratified_kfold
        n_splits: 10
      test_split:
        method: stratified_shuffle
        test_size: 0.2

    evaluation:
      primary_metric: macro_f1
      report_metrics:
        - accuracy
        - macro_f1
        - macro_precision
        - macro_recall

model:
  classifiers:
    - naive_bayes
    - knn
    - decision_tree
    - random_forest
    - gradient_boost
    - xgboost
  exclusions:
    - classifier: knn
      configurations:
        - scaled_class_weighting
        - scaled_feature_selection_class_weighting
        - scaled_pca_class_weighting

outputs:
  results_directory: reports/results
  figures_directory: reports/figures
