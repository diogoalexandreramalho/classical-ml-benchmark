# Reduced hyperparameter grids for Stage 2 grid search.
#
# The full original grids (~200-560 combos per classifier) live in
# `hyperparameters_full.yaml` for reference. These reduced grids sample
# 3-4 representative values per hyperparameter (low / mid / high) to surface
# the main trend without exhaustive search. If a classifier shows a clear
# tendency on one edge, we expand that axis in a follow-up run.

PD:

  naive_bayes:
    defaults: {}
    grid: {}

  knn:
    defaults:
      n_neighbors: 1
      metric: manhattan
    grid:
      n_neighbors: [1, 3, 5, 11, 25, 50, 100]
      metric: [manhattan, euclidean, chebyshev]

  decision_tree:
    defaults:
      min_samples_leaf: 0.05
      max_depth: 5
      criterion: entropy
    grid:
      min_samples_leaf: [0.05, 0.01, 0.005, 0.001]
      max_depth: [3, 5, 10, 25, 50]
      criterion: [entropy, gini]

  random_forest:
    defaults:
      n_estimators: 100
      max_depth: 10
      max_features: sqrt
    grid:
      n_estimators: [50, 100, 200]
      max_depth: [5, 10, 25]
      max_features: [sqrt, log2]

  gradient_boost:
    defaults:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 5
      max_features: sqrt
    grid:
      learning_rate: [0.05, 0.1, 0.3]
      n_estimators: [50, 100, 200]
      max_depth: [3, 5, 10]
      max_features: [sqrt]

  xgboost:
    defaults:
      n_estimators: 100
      max_depth: 5
    grid:
      n_estimators: [50, 100, 200]
      max_depth: [3, 5, 10]

CT:

  naive_bayes:
    defaults: {}
    grid: {}

  knn:
    defaults:
      n_neighbors: 1
      metric: manhattan
    grid:
      n_neighbors: [1, 3, 10, 25, 50, 100]
      metric: [manhattan, euclidean, chebyshev]

  decision_tree:
    defaults:
      min_samples_leaf: 0.01
      max_depth: 10
      criterion: entropy
    grid:
      min_samples_leaf: [0.01, 0.001, 0.0001, 0.00001]
      max_depth: [10, 30, 50, 100]
      criterion: [entropy, gini]

  random_forest:
    defaults:
      n_estimators: 100
      max_depth: 25
      max_features: sqrt
    grid:
      n_estimators: [50, 100, 200]
      max_depth: [10, 25, 50]
      max_features: [sqrt, log2]

  gradient_boost:
    defaults:
      n_estimators: 100
      learning_rate: 0.1
      max_depth: 5
      max_features: sqrt
    grid:
      learning_rate: [0.05, 0.1, 0.5]
      n_estimators: [50, 100, 200]
      max_depth: [5, 10, 25]
      max_features: [sqrt]

  xgboost:
    defaults:
      n_estimators: 100
      max_depth: 5
    grid:
      n_estimators: [50, 100, 200]
      max_depth: [3, 5, 10]
